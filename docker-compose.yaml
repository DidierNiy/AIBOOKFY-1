services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    container_name: aibookify-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - VIRTUAL_HOST=${FRONTEND_DOMAIN}
      - LETSENCRYPT_HOST=${FRONTEND_DOMAIN}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    networks:
      - app-network
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aibookify-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      - VIRTUAL_HOST=${BACKEND_DOMAIN}
      - LETSENCRYPT_HOST=${BACKEND_DOMAIN}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
      - VIRTUAL_PORT=5003
      - MONGODB_URI=mongodb://mongodb:27017/aibookify
      - NODE_ENV=production
    env_file:
      - ./backend/.env
    networks:
      - app-network
      - internal

  mongodb:
    image: mongo:7.0
    container_name: aibookify-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - internal

volumes:
  mongodb_data:


networks:
  app-network:
    external: true
    name: app-network
  internal:
    driver: bridge
